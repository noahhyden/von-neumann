name: ci

# The standard push/PR gate: is OUR code green? Runs closure-sim's pytest suite and
# the frontend's parity + contract tests + build. pimas is consumed from npm as
# pimas-ui (aliased to the bare "pimas" specifier in frontend/package.json), so the
# frontend job is deterministic against whatever version the lockfile pins - no
# sibling checkout or source build required.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # The shared vn_core package (RNG, UQ, ODE, linalg). Runs its own suite under
      # coverage and fails the build below the gate configured in core/pyproject.toml
      # ([tool.coverage.report] fail_under). scipy/numpy are dev-only test oracles.
      - name: pytest + coverage gate (vn_core)
        working-directory: core
        run: |
          uv run --extra dev coverage run -m pytest -q
          uv run --extra dev coverage report

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Repo-level tooling (depgraph.py). Runs under coverage and fails below the
      # gate in scripts/pyproject.toml. depgraph's live tests assert the real import
      # DAG / paper edges, so a structural drift (a new cross-module import, a moved
      # result, a renamed figure) fails here rather than silently.
      - name: pytest + coverage gate (depgraph)
        working-directory: scripts
        run: |
          uv run --extra dev coverage run -m pytest -q
          uv run --extra dev coverage report

  closure-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: closure-sim
        run: uv run --extra dev pytest -q

  probe-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: probe-sim
        run: uv run --extra dev pytest -q

  power-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: power-budget
        run: uv run --extra dev pytest -q

  launch-economics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: launch-economics
        run: uv run --extra dev pytest -q

  mission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (end-to-end behavior assertions)
        working-directory: mission
        run: uv run --extra dev pytest -q

  multi-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (deterministic fleet behavior assertions)
        working-directory: multi-probe
        run: uv run --extra dev pytest -q

  swarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Rust toolchain + maturin for the pyo3 fast-path (issue #33). Optional at
      # runtime (swarm/kd_backends.py falls back to numba or pure Python if the
      # extension is not importable), but CI builds it so the 3-way A/B/C oracle
      # in tests/test_kdtree_backends.py actually exercises all three backends
      # rather than skipping the Rust cases.
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the swarm_rust pyo3 extension into swarm's venv
        working-directory: swarm
        run: |
          uv sync --extra dev --extra rust
          uv run --extra rust maturin develop --release --manifest-path rust/Cargo.toml
      - name: pytest (deterministic settlement-front assertions, all 3 backends)
        working-directory: swarm
        run: uv run --extra dev pytest -q

  spine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (cross-scale integration assertions)
        working-directory: spine
        run: uv run --extra dev pytest -q

  papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gen-versions (the sanity check below) derives each paper's
          # version list from every commit touching papers/<slug>/. A shallow clone
          # would truncate it. Also gives paths-filter reliable diff history.
          fetch-depth: 0
      # Figure generation runs a validated simulation ensemble and can be minutes of
      # compute per paper; typesetting spins up a full LaTeX container. Doing both for
      # EVERY paper on EVERY run wastes compute when a change touches neither a paper nor
      # its figure-source module. So we scope the expensive steps (figure gen + typeset)
      # to the papers actually affected by the diff. A paper is affected when its own
      # files change, when its figure-source module changes, or when a shared input
      # changes (the bibliography source, the generator scripts, or this workflow). The
      # cheap correctness checks below (bib/index/typography, papers/RULES.md R2-R6) still
      # run unconditionally, since they are fast and catch cross-cutting bib/cite drift.
      # (The Pages deploy in pages.yml still builds ALL papers - the published site needs
      # every PDF - so this scoping is a CI-gate optimization only.)
      - name: Detect which papers the diff affects
        uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: |
            shared: &shared
              - 'frontend/src/sources.ts'
              - 'papers/scripts/**'
              - '.github/workflows/ci.yml'
            coordination_tax:
              - *shared
              - 'papers/coordination-tax/**'
              - 'swarm/**'
            electronics_wall:
              - *shared
              - 'papers/electronics-wall/**'
              - 'closure-sim/**'
            spine:
              - *shared
              - 'papers/spine/**'
              - 'spine/**'
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # gen-bib/gen-index import frontend/src/sources.ts directly (Node native TS),
      # so no install step is needed. gen-index enforces the paper rules
      # (papers/RULES.md): every cited id resolves in the bibliography, prose cites
      # and declared cites match exactly, and the main.tex abstract matches
      # paper.json. It exits nonzero on any violation.
      - name: Generate refs.bib and refresh the papers index
        working-directory: papers
        run: |
          node scripts/gen-bib.mjs
          node scripts/gen-index.mjs
      - name: The committed papers index must match the generator output
        run: git diff --exit-code frontend/src/papers-index.ts
      # gen-versions builds the version manifest from git history (issue #7). It is a
      # BUILD artifact, not committed (its newest entry names the current commit's own
      # SHA), so there is no git-diff gate here - this step just proves the generator
      # runs against real history and emits a parseable module.
      - name: Generate the paper version manifest (build artifact, not committed)
        working-directory: papers
        run: |
          node scripts/gen-versions.mjs
          node -e "const {PAPER_VERSIONS}=await import('../frontend/src/papers-versions.ts'); const n=Object.values(PAPER_VERSIONS).reduce((a,v)=>a+v.length,0); if(!n){console.error('gen-versions produced no versions; is the checkout shallow?');process.exit(1);} console.log('gen-versions OK:',n,'versions');"
      # The Zenodo deposit metadata (issue #8) is built from paper.json; this guards
      # that the network-free core (name formatting, metadata shape) stays faithful.
      # The API-driving phases are exercised by a real sandbox run, not here.
      - name: Zenodo metadata builder tests
        run: node --test papers/scripts/zenodo-publish.test.mjs
      - name: Typography rules - no em-dash, no en-dash, no emoji (papers/RULES.md)
        working-directory: papers
        run: node scripts/check-typography.mjs
      # Figures are generated (gitignored vector PDFs) from the validated source
      # modules, so the paper restates only their real output (papers/RULES.md R1, P4).
      # A figure-build failure fails the PR, since the typeset below needs them. Each
      # paper's figure + typeset pair runs only when that paper is affected (see above).
      # coordination-tax figures RENDER from committed JSON result artifacts
      # (swarm/experiments/results/), not from a live simulation. The heavy ensemble
      # (swarm/experiments/measure.py) runs LOCALLY and commits its deterministic seeded
      # output; CI only plots it, which takes a few seconds - so there is no figure cache here
      # (a change to the committed JSON, i.e. new data, or to the figure code re-renders
      # directly, and the swarm pytest job's drift-guard re-runs a slice to prove the committed
      # JSON still matches the fold). The heavy measure.py is never run in CI. (electronics-wall
      # below still builds its own figures from closure-sim and keeps its source-keyed cache.)
      - name: Render coordination-tax figures from committed results (swarm)
        if: steps.changed.outputs.coordination_tax == 'true'
        working-directory: swarm
        run: uv run --extra dev python -m experiments.paper_figures
      - name: Typeset coordination-tax (LaTeX) - a broken .tex fails the PR
        if: steps.changed.outputs.coordination_tax == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: papers/coordination-tax
          root_file: main.tex
      - name: Cache electronics-wall figures
        id: figs-ew
        if: steps.changed.outputs.electronics_wall == 'true'
        uses: actions/cache@v4
        with:
          path: papers/electronics-wall/fig_*.pdf
          key: figs-electronics-wall-ci-v1-${{ hashFiles('closure-sim/src/**/*.py', 'closure-sim/pyproject.toml', 'closure-sim/uv.lock') }}
      - name: Generate electronics-wall figures (closure-sim)
        if: steps.changed.outputs.electronics_wall == 'true' && steps.figs-ew.outputs.cache-hit != 'true'
        working-directory: closure-sim
        run: uv run --extra dev python -m closure_sim.paper_figures
      - name: Typeset electronics-wall (LaTeX) - a broken .tex fails the PR
        if: steps.changed.outputs.electronics_wall == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: papers/electronics-wall
          root_file: main.tex
      # spine figures RENDER from committed JSON (spine/experiments/results/), exactly like
      # coordination-tax above: the heavy ensemble (spine/experiments/measure.py) runs LOCALLY
      # and commits its deterministic seeded output; CI only plots it (a few seconds), and the
      # spine pytest job's drift-guard re-checks that committed JSON against the fold - so no
      # figure cache here. The spine paper ships on the live site (pages.yml builds every
      # paper), so a PR that edits it must also be gated and rendered like the other two.
      - name: Render spine figures from committed results (spine)
        if: steps.changed.outputs.spine == 'true'
        working-directory: spine
        run: uv run --extra dev python -m experiments.paper_figures
      - name: Typeset spine (LaTeX) - a broken .tex fails the PR
        if: steps.changed.outputs.spine == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: papers/spine
          root_file: main.tex

      # Reviewable render (issue #23): on a PR, publish each paper the diff actually typeset
      # above as a downloadable PDF, so a reviewer can eyeball the real render before merge
      # instead of merging to check. Only affected papers were typeset, so only those are
      # staged; a PR touching no paper stages nothing (warn, never fail). Review aid only -
      # pages.yml still builds every paper for the deployed site.
      - name: Stage typeset PDFs for review
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-render/papers
          for d in papers/*/; do
            [ -f "${d}main.tex" ] || continue
            slug=$(basename "$d")
            if [ -f "${d}main.pdf" ]; then
              cp "${d}main.pdf" "pr-render/papers/${slug}.pdf"
              echo "staged ${slug}.pdf"
            fi
          done
      - name: Upload rendered paper PDFs as a reviewable artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdfs
          path: pr-render/papers/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the gen-versions step below (and the build) see every
          # commit touching papers/<slug>/, matching the real deploy.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend (pimas resolves via npm alias to pimas-ui)
        working-directory: frontend
        run: npm ci

      # Generate the gitignored version manifest before the tests so papers.test.ts
      # exercises real git-derived data (it no-ops gracefully if the file is absent,
      # but here we want it present). The build step also regenerates it.
      - name: Generate the paper version manifest
        run: node papers/scripts/gen-versions.mjs

      - name: Layer A - model parity vs the Python CLI (no pimas)
        working-directory: frontend
        run: npm test

      - name: Layer B - pimas contract (against the pinned pimas-ui version)
        working-directory: frontend
        run: npm run test:contract

      - name: Build the page
        working-directory: frontend
        run: npm run build

      # Reviewable render (issue #23): on a PR, upload the built bundle so a reviewer can
      # download and serve it locally (the page is an ES-module SPA - it must be served,
      # not opened via file://; `npm run preview` does the CI-parity build + serve). This
      # is the same dist/ pages.yml deploys, minus the paper PDFs it injects at deploy time
      # (those are reviewed as the separate paper-pdfs artifact), so in-app PDF links 404
      # locally - expected. Review aid only; the live deploy is still pages.yml on main.
      - name: Upload the built frontend as a reviewable artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 14
