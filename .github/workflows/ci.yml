name: ci

# The standard push/PR gate: is OUR code green? Runs closure-sim's pytest suite and
# the frontend's parity + contract tests + build. The frontend is tested against the
# PINNED pimas (frontend/.pimas-good-sha) so this job is deterministic and isolates
# our regressions; catching pimas HEAD regressions is the separate pimas-canary.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  closure-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: closure-sim
        run: uv run --extra dev pytest -q

  probe-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: probe-sim
        run: uv run --extra dev pytest -q

  power-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: power-budget
        run: uv run --extra dev pytest -q

  launch-economics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (real-number assertions)
        working-directory: launch-economics
        run: uv run --extra dev pytest -q

  mission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (end-to-end behavior assertions)
        working-directory: mission
        run: uv run --extra dev pytest -q

  multi-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (deterministic fleet behavior assertions)
        working-directory: multi-probe
        run: uv run --extra dev pytest -q

  swarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (deterministic settlement-front assertions)
        working-directory: swarm
        run: uv run --extra dev pytest -q

  spine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: pytest (cross-scale integration assertions)
        working-directory: spine
        run: uv run --extra dev pytest -q

  papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gen-versions (the sanity check below) derives each paper's
          # version list from every commit touching papers/<slug>/. A shallow clone
          # would truncate it. Also gives paths-filter reliable diff history.
          fetch-depth: 0
      # Figure generation runs a validated simulation ensemble and can be minutes of
      # compute per paper; typesetting spins up a full LaTeX container. Doing both for
      # EVERY paper on EVERY run wastes compute when a change touches neither a paper nor
      # its figure-source module. So we scope the expensive steps (figure gen + typeset)
      # to the papers actually affected by the diff. A paper is affected when its own
      # files change, when its figure-source module changes, or when a shared input
      # changes (the bibliography source, the generator scripts, or this workflow). The
      # cheap correctness checks below (bib/index/typography, papers/RULES.md R2-R6) still
      # run unconditionally, since they are fast and catch cross-cutting bib/cite drift.
      # (The Pages deploy in pages.yml still builds ALL papers - the published site needs
      # every PDF - so this scoping is a CI-gate optimization only.)
      - name: Detect which papers the diff affects
        uses: dorny/paths-filter@v3
        id: changed
        with:
          filters: |
            shared: &shared
              - 'frontend/src/sources.ts'
              - 'papers/scripts/**'
              - '.github/workflows/ci.yml'
            coordination_tax:
              - *shared
              - 'papers/coordination-tax/**'
              - 'swarm/**'
            electronics_wall:
              - *shared
              - 'papers/electronics-wall/**'
              - 'closure-sim/**'
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # gen-bib/gen-index import frontend/src/sources.ts directly (Node native TS),
      # so no install step is needed. gen-index enforces the paper rules
      # (papers/RULES.md): every cited id resolves in the bibliography, prose cites
      # and declared cites match exactly, and the main.tex abstract matches
      # paper.json. It exits nonzero on any violation.
      - name: Generate refs.bib and refresh the papers index
        working-directory: papers
        run: |
          node scripts/gen-bib.mjs
          node scripts/gen-index.mjs
      - name: The committed papers index must match the generator output
        run: git diff --exit-code frontend/src/papers-index.ts
      # gen-versions builds the version manifest from git history (issue #7). It is a
      # BUILD artifact, not committed (its newest entry names the current commit's own
      # SHA), so there is no git-diff gate here - this step just proves the generator
      # runs against real history and emits a parseable module.
      - name: Generate the paper version manifest (build artifact, not committed)
        working-directory: papers
        run: |
          node scripts/gen-versions.mjs
          node -e "const {PAPER_VERSIONS}=await import('../frontend/src/papers-versions.ts'); const n=Object.values(PAPER_VERSIONS).reduce((a,v)=>a+v.length,0); if(!n){console.error('gen-versions produced no versions; is the checkout shallow?');process.exit(1);} console.log('gen-versions OK:',n,'versions');"
      # The Zenodo deposit metadata (issue #8) is built from paper.json; this guards
      # that the network-free core (name formatting, metadata shape) stays faithful.
      # The API-driving phases are exercised by a real sandbox run, not here.
      - name: Zenodo metadata builder tests
        run: node --test papers/scripts/zenodo-publish.test.mjs
      - name: Typography rules - no em-dash, no en-dash, no emoji (papers/RULES.md)
        working-directory: papers
        run: node scripts/check-typography.mjs
      # Figures are generated (gitignored vector PDFs) from the validated source
      # modules, so the paper restates only their real output (papers/RULES.md R1, P4).
      # A figure-build failure fails the PR, since the typeset below needs them. Each
      # paper's figure + typeset pair runs only when that paper is affected (see above).
      # Figure generation runs a seeded event-mode ensemble that can be minutes of compute,
      # so we cache the resulting PDFs keyed on the SOURCE that produces them (the sim +
      # experiment code + its locked deps). A paper affected only by a prose/.tex change
      # therefore restores its figures from cache and skips regeneration; a change to the
      # figure-source module misses the cache and rebuilds. The fold is deterministic, so a
      # cache hit is byte-identical to a rebuild.
      - name: Cache coordination-tax figures
        id: figs-ct
        if: steps.changed.outputs.coordination_tax == 'true'
        uses: actions/cache@v4
        with:
          path: papers/coordination-tax/fig_*.pdf
          key: figs-coordination-tax-ci-v1-${{ hashFiles('swarm/src/**/*.py', 'swarm/experiments/**/*.py', 'swarm/pyproject.toml', 'swarm/uv.lock') }}
      - name: Generate coordination-tax figures (swarm)
        if: steps.changed.outputs.coordination_tax == 'true' && steps.figs-ct.outputs.cache-hit != 'true'
        working-directory: swarm
        run: uv run --extra dev python -m experiments.paper_figures
      - name: Typeset coordination-tax (LaTeX) - a broken .tex fails the PR
        if: steps.changed.outputs.coordination_tax == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: papers/coordination-tax
          root_file: main.tex
      - name: Cache electronics-wall figures
        id: figs-ew
        if: steps.changed.outputs.electronics_wall == 'true'
        uses: actions/cache@v4
        with:
          path: papers/electronics-wall/fig_*.pdf
          key: figs-electronics-wall-ci-v1-${{ hashFiles('closure-sim/src/**/*.py', 'closure-sim/pyproject.toml', 'closure-sim/uv.lock') }}
      - name: Generate electronics-wall figures (closure-sim)
        if: steps.changed.outputs.electronics_wall == 'true' && steps.figs-ew.outputs.cache-hit != 'true'
        working-directory: closure-sim
        run: uv run --extra dev python -m closure_sim.paper_figures
      - name: Typeset electronics-wall (LaTeX) - a broken .tex fails the PR
        if: steps.changed.outputs.electronics_wall == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: papers/electronics-wall
          root_file: main.tex

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Check out von-neumann
        uses: actions/checkout@v4
        with:
          path: von-neumann
          # Full history so build.mjs's gen-versions step (and the pre-test manifest
          # below) see every commit touching papers/<slug>/, matching the real deploy.
          fetch-depth: 0

      - name: Resolve pinned pimas SHA
        id: pin
        run: echo "sha=$(cat von-neumann/frontend/.pimas-good-sha)" >> "$GITHUB_OUTPUT"

      - name: Check out pimas at the pinned SHA
        uses: actions/checkout@v4
        with:
          repository: noahhyden/pimas
          ref: ${{ steps.pin.outputs.sha }}
          path: pimas

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # dist/ is gitignored and pimas has no prepare hook - build before consuming.
      - name: Build pimas
        working-directory: pimas
        run: |
          npm ci
          npm run build

      - name: Install frontend (resolves file:../../pimas)
        working-directory: von-neumann/frontend
        run: npm ci

      # Generate the gitignored version manifest before the tests so papers.test.ts
      # exercises real git-derived data (it no-ops gracefully if the file is absent,
      # but here we want it present). The build step also regenerates it.
      - name: Generate the paper version manifest
        working-directory: von-neumann
        run: node papers/scripts/gen-versions.mjs

      - name: Layer A - model parity vs the Python CLI (no pimas)
        working-directory: von-neumann/frontend
        run: npm test

      - name: Layer B - pimas contract (against the pinned pimas)
        working-directory: von-neumann/frontend
        run: npm run test:contract

      - name: Build the page
        working-directory: von-neumann/frontend
        run: npm run build
