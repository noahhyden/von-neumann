name: pimas-canary

# Detects VERIFIED pimas framework regressions from the frontend and files them in
# the pimas repo. Attribution is by test layer (see frontend/README.md "pimas canary"):
#   Layer A (npm test)          - pure model, no pimas. Green here => our model is fine.
#   Layer B (npm run test:contract) - pimas primitives only. Red here (with A green) => pimas.
# Gate: A green AND B red => framework breakage => open/append an issue in pimas.
#
# pimas is linked via file:../../pimas as a symlink to its working tree, and dist/ is
# gitignored with no prepare hook - so CI must check pimas out beside von-neumann and
# `npm run build` it before the frontend can import it. pimas is v0.0.0 with no tags,
# so the baseline is pinned by git SHA in frontend/.pimas-good-sha.

on:
  # Fires when pimas pushes to main (needs a repository-dispatch step in the pimas
  # repo that targets noahhyden/von-neumann with event-type "pimas-canary"). Until
  # that exists, the nightly schedule + manual trigger below still run the canary.
  repository_dispatch:
    types: [pimas-canary]
  schedule:
    - cron: "0 6 * * *" # nightly safety net (06:00 UTC)
  workflow_dispatch:

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out von-neumann
        uses: actions/checkout@v4
        with:
          path: von-neumann

      - name: Check out pimas (pushed SHA, or main)
        uses: actions/checkout@v4
        with:
          repository: noahhyden/pimas
          ref: ${{ github.event.client_payload.pimas_sha || 'main' }}
          path: pimas
          fetch-depth: 0 # full history so we can report the good..HEAD range

      - uses: actions/setup-node@v4
        with:
          node-version: "24" # frontend tests run .ts directly via node --test

      # dist/ is gitignored and pimas has no prepare hook - build before consuming.
      - name: Build pimas
        working-directory: pimas
        run: |
          npm ci
          npm run build

      - name: Install frontend (resolves file:../../pimas)
        working-directory: von-neumann/frontend
        run: npm ci

      - name: Layer A - model parity (pure, no pimas)
        id: parity
        working-directory: von-neumann/frontend
        run: npm test

      - name: Layer B - pimas contract canary
        id: canary
        if: steps.parity.outcome == 'success'
        working-directory: von-neumann/frontend
        run: npm run test:contract

      - name: Layer C - integration smoke (non-blocking context)
        id: smoke
        if: steps.parity.outcome == 'success'
        continue-on-error: true
        working-directory: von-neumann/frontend
        run: npm run smoke

      # Framework-breakage gate: Layer A green AND Layer B red.
      - name: File / update issue in pimas
        if: steps.parity.outcome == 'success' && steps.canary.outcome == 'failure'
        env:
          # Fine-grained PAT with issues:write on noahhyden/pimas, stored as a secret
          # in this repo. (Credential-light alternative: repository_dispatch the result
          # back to pimas and let its own GITHUB_TOKEN open the issue.)
          GH_TOKEN: ${{ secrets.PIMAS_ISSUES_TOKEN }}
        working-directory: von-neumann
        run: |
          set -euo pipefail
          MARK="pimas-canary"
          GOOD="$(cat frontend/.pimas-good-sha)"
          HEAD_SHA="$(git -C ../pimas rev-parse HEAD)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="pimas-canary: framework regression breaks von-neumann/frontend"
          BODY=$(cat <<EOF
          Layer A (pure model parity) **passed**; Layer B (pimas contract canary) **failed** - attributed to **pimas**, not to frontend code.

          - Regression is in pimas between \`${GOOD}\` (last known-good) and \`${HEAD_SHA}\` (HEAD).
          - Failing contracts: see the run log.
          - CI run: ${RUN_URL}

          Fix in pimas, then bump \`frontend/.pimas-good-sha\` to the fixed SHA.

          <!-- fingerprint:${MARK} -->
          EOF
          )
          EXISTING=$(gh issue list --repo noahhyden/pimas --state open \
            --search "in:body ${MARK}" --json number -q '.[0].number' || echo "")
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --repo noahhyden/pimas --body "${BODY}"
          else
            gh issue create --repo noahhyden/pimas --title "${TITLE}" --body "${BODY}"
          fi
