name: deploy-pages

# Build and publish the frontend to GitHub Pages (vn.noahhyden.com). The site is a
# build artifact: frontend/dist/ is gitignored and produced by esbuild after pimas is
# built, so this workflow builds pimas at the pinned SHA (frontend/.pimas-good-sha),
# builds the frontend, and deploys dist/. Mirrors the frontend job in ci.yml; pimas is
# public, so the default GITHUB_TOKEN can check it out (no PAT needed).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out von-neumann
        uses: actions/checkout@v4
        with:
          path: von-neumann

      - name: Resolve pinned pimas SHA
        id: pin
        run: echo "sha=$(cat von-neumann/frontend/.pimas-good-sha)" >> "$GITHUB_OUTPUT"

      - name: Check out pimas at the pinned SHA
        uses: actions/checkout@v4
        with:
          repository: noahhyden/pimas
          ref: ${{ steps.pin.outputs.sha }}
          path: pimas

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # dist/ is gitignored and pimas has no prepare hook - build pimas before consuming.
      - name: Build pimas (pinned)
        working-directory: pimas
        run: |
          npm ci
          npm run build

      - name: Install + build the frontend
        working-directory: von-neumann/frontend
        run: |
          npm ci
          npm run build

      # Papers: generate the .bib from sources.ts (the single bibliography source of
      # truth), typeset each paper with the IEEE LaTeX template, and publish the PDFs
      # beside the site at /papers/<slug>.pdf. The LaTeX step is best-effort: a broken
      # paper must never block the site deploy (ci.yml gates paper correctness on PRs).
      - name: Generate the paper bibliography from sources.ts
        working-directory: von-neumann/papers
        run: node scripts/gen-bib.mjs

      # Figures are gitignored vector PDFs generated from the source modules. Best-effort,
      # like the LaTeX step: if a figure build fails, the paper simply typesets without it
      # (or is skipped below) and the site still deploys. ci.yml gates this on PRs.
      #
      # Generation runs a seeded event-mode ensemble that can be many minutes of compute, and
      # it runs on every push to main, so we cache the resulting PDFs keyed on the SOURCE that
      # produces them (sim + experiment code + locked deps). A deploy that did not touch a
      # figure-source module restores its figures from cache and skips regeneration; the fold
      # is deterministic, so a hit is byte-identical to a rebuild. This keeps a no-sim-change
      # deploy fast instead of paying the full figure build each time.
      - name: Cache coordination-tax figures
        id: figs-ct
        uses: actions/cache@v4
        with:
          path: von-neumann/papers/coordination-tax/fig_*.pdf
          key: figs-coordination-tax-pages-v1-${{ hashFiles('von-neumann/swarm/src/**/*.py', 'von-neumann/swarm/experiments/**/*.py', 'von-neumann/swarm/pyproject.toml', 'von-neumann/swarm/uv.lock') }}
      - name: Generate coordination-tax figures (swarm)
        if: steps.figs-ct.outputs.cache-hit != 'true'
        continue-on-error: true
        working-directory: von-neumann/swarm
        run: uv run --extra dev python -m experiments.paper_figures

      - name: Cache electronics-wall figures
        id: figs-ew
        uses: actions/cache@v4
        with:
          path: von-neumann/papers/electronics-wall/fig_*.pdf
          key: figs-electronics-wall-pages-v1-${{ hashFiles('von-neumann/closure-sim/src/**/*.py', 'von-neumann/closure-sim/pyproject.toml', 'von-neumann/closure-sim/uv.lock') }}
      - name: Generate electronics-wall figures (closure-sim)
        if: steps.figs-ew.outputs.cache-hit != 'true'
        continue-on-error: true
        working-directory: von-neumann/closure-sim
        run: uv run --extra dev python -m closure_sim.paper_figures

      - name: Typeset the papers (LaTeX)
        uses: xu-cheng/latex-action@v4
        continue-on-error: true
        with:
          working_directory: von-neumann/papers
          root_file: "*/main.tex"
          work_in_root_file_dir: true

      - name: Publish paper PDFs into the site
        run: |
          mkdir -p von-neumann/frontend/dist/papers
          for d in von-neumann/papers/*/; do
            [ -f "${d}main.tex" ] || continue
            slug=$(basename "$d")
            if [ -f "${d}main.pdf" ]; then
              cp "${d}main.pdf" "von-neumann/frontend/dist/papers/${slug}.pdf"
              echo "published ${slug}.pdf"
            else
              echo "WARNING: no PDF for ${slug} (LaTeX compile failed); site deploys without it"
            fi
          done

      - name: Upload the built site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: von-neumann/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
